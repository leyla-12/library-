<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Đăng nhập - Library University</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      max-width: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: 'Be Vietnam Pro', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: url('assets/img/tvien.jpg') center/cover no-repeat;
      position: relative;
      overflow: hidden;
    }

    .login-wrapper {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(10px);
      border: 2px solid #4a9fd4;
      border-radius: 12px;
      padding: 40px 48px;
      width: 100%;
      max-width: 480px;
      position: relative;
      z-index: 1;
      box-shadow: 0 8px 32px rgba(74,159,212,0.15);
      animation: fadeUp 0.5s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-area {
      text-align: center;
      margin-bottom: 24px;
    }
    .logo-area img {
      width: 52px;
      margin-bottom: 6px;
    }
    .logo-area .logo-svg {
      display: block;
      margin: 0 auto 6px;
    }
    .logo-name {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #1a3c5e;
    }

    h2.form-title {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      color: #2980b9;
      margin-bottom: 24px;
      letter-spacing: 1px;
    }

    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      color: #2c3e50;
      margin-bottom: 6px;
      font-weight: 500;
    }
    .form-group input[type="text"],
    .form-group input[type="password"],
    .form-group input[type="email"] {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #b0cfe8;
      border-radius: 5px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border 0.2s;
      background: #fff;
      color: #2c3e50;
    }
    .form-group input:focus {
      border-color: #2980b9;
    }

    .options-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      font-size: 13px;
    }
    .options-row label {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #555;
      cursor: pointer;
    }
    .options-row a {
      color: #2980b9;
      text-decoration: none;
      font-weight: 500;
    }
    .options-row a:hover { text-decoration: underline; }

    .btn-primary {
      width: 100%;
      padding: 11px;
      background: #2980b9;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      font-family: inherit;
    }
    .btn-primary:hover { background: #1f6fa0; }
    .btn-primary:active { transform: scale(0.98); }

    .bottom-text {
      text-align: center;
      margin-top: 18px;
      font-size: 13px;
      color: #555;
    }
    .bottom-text a {
      color: #2980b9;
      text-decoration: none;
      font-weight: 600;
    }
    .bottom-text a:hover { text-decoration: underline; }

    /* Toast notification */
    .toast {
      position: fixed;
      top: 24px; right: 24px;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      z-index: 9999;
      opacity: 0;
      transform: translateY(-10px);
      transition: all 0.3s ease;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: #27ae60; }
    .toast.error   { background: #e74c3c; }

    img {
      max-width: 100%;
      height: auto;
    }

    input, button {
      max-width: 100%;
    }

    @media (max-width: 768px) {
      .login-wrapper {
        padding: 28px 24px;
        max-width: 95%;
        margin: 16px;
      }
      h2.form-title {
        font-size: 18px;
      }
    }

    @media (max-width: 480px) {
      .login-wrapper {
        padding: 24px 16px;
      }
    }
  </style>
</head>
<body>

  <div class="login-wrapper">
    <!-- Logo -->
    <div class="logo-area">
      <svg class="logo-svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
        <path d="M24 4C24 4 12 10 12 22V38L24 44L36 38V22C36 10 24 4 24 4Z" fill="#2980b9" opacity="0.15"/>
        <path d="M24 8L14 14V30L24 36L34 30V14L24 8Z" fill="none" stroke="#1a3c5e" stroke-width="1.5"/>
        <path d="M18 20H30M18 25H30M18 30H26" stroke="#2980b9" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="24" cy="13" r="3" fill="#2980b9"/>
      </svg>
      <div class="logo-name">LIBRARY UNIVERSITY</div>
    </div>

    <h2 class="form-title">ĐĂNG NHẬP</h2>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Tên đăng nhập/ Email</label>
        <input type="text" id="username" name="username" placeholder="" autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="password">Mật khẩu</label>
        <input type="password" id="password" name="password" placeholder="" autocomplete="current-password" />
      </div>

      <div class="options-row">
        <label>
          <input type="checkbox" name="remember" id="remember" />
          Ghi nhớ tôi
        </label>
        <a href="quenmatkhau.html">Quên mật khẩu?</a>
      </div>

      <button type="submit" class="btn-primary">ĐĂNG NHẬP</button>
    </form>

    <p class="bottom-text">
      Chưa có tài khoản? <a href="#">Đăng ký ngay</a>
    </p>
  </div>

  <div class="toast" id="toast"></div>

  <script src="assets/js/dangnhap.js"></script>
  <script>
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type} show`;
      setTimeout(() => t.className = 'toast', 3000);
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!username || !password) {
        showToast('Vui lòng nhập đầy đủ thông tin.', 'error');
        return;
      }

      // Tài khoản demo — thay bằng API khi có backend
      const users = [
        { username: 'admin',   password: 'admin123',  role: 'admin',  redirect: 'taikhoan.html'   },
        { username: 'thuthu',  password: 'thuthu123', role: 'thuthu', redirect: 'quanlysach.html' },
        { username: 'thuthu2', password: 'thuthu123', role: 'thuthu', redirect: 'quanlysach.html' },
      ];

      const matched = users.find(u => u.username === username && u.password === password);

      if (matched) {
        sessionStorage.setItem('role', matched.role);
        sessionStorage.setItem('username', matched.username);
        showToast('Đăng nhập thành công!', 'success');
        setTimeout(() => window.location.href = matched.redirect, 1200);
      } else {
        showToast('Tên đăng nhập hoặc mật khẩu không đúng.', 'error');
      }
    });
  </script>
</body>
</html>
