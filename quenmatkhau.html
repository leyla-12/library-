<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quên mật khẩu - Library University</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Be Vietnam Pro', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(214,234,248,0.75), rgba(133,193,233,0.75)),
                  url('assets/img/tvien.jpg') center/cover no-repeat;
      position: relative;
      overflow: hidden;
    }

    .card {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 44px 52px;
      width: 100%;
      max-width: 500px;
      position: relative;
      z-index: 1;
      box-shadow: 0 8px 32px rgba(74,159,212,0.18);
      animation: fadeUp 0.5s ease;
      text-align: center;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-area {
      margin-bottom: 20px;
    }
    .logo-name {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #1a3c5e;
      margin-top: 6px;
    }

    h2.form-title {
      font-size: 22px;
      font-weight: 700;
      color: #2980b9;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .instruction {
      font-size: 13px;
      color: #555;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .form-group {
      text-align: left;
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      color: #2c3e50;
      margin-bottom: 6px;
      font-weight: 500;
    }
    .form-group input[type="email"] {
      width: 100%;
      padding: 10px 13px;
      border: 1px solid #b0cfe8;
      border-radius: 5px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border 0.2s;
      background: #fff;
      color: #2c3e50;
    }
    .form-group input:focus { border-color: #2980b9; }

    .btn-primary {
      width: 100%;
      padding: 11px;
      background: #2980b9;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      font-family: inherit;
      margin-bottom: 16px;
    }
    .btn-primary:hover { background: #1f6fa0; }
    .btn-primary:active { transform: scale(0.98); }

    .bottom-text {
      font-size: 13px;
      color: #555;
    }
    .bottom-text a {
      color: #2980b9;
      text-decoration: none;
      font-weight: 600;
    }
    .bottom-text a:hover { text-decoration: underline; }

    /* Toast */
    .toast {
      position: fixed;
      top: 24px; right: 24px;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      z-index: 9999;
      opacity: 0;
      transform: translateY(-10px);
      transition: all 0.3s ease;
      pointer-events: none;
      max-width: 320px;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: #27ae60; }
    .toast.error   { background: #e74c3c; }
    /* ====== RESPONSIVE FIX ====== */

html, body {
  max-width: 100%;
  overflow-x: hidden;
}

img {
  max-width: 100%;
  height: auto;
}

/* fix form/card */
.card {
  width: 100%;
  max-width: 500px;
}

/* input không tràn */
input, button {
  max-width: 100%;
}

/* mobile */
@media (max-width: 768px) {
  .card {
    padding: 20px !important;
    max-width: 95% !important;
  }

  h1, h2, h3 {
    font-size: 90%;
  }

  .btn-primary {
    width: 100%;
  }
}
  </style>
</head>
<body>

  <div class="card">
    <!-- Logo -->
    <div class="logo-area">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <path d="M24 4C24 4 12 10 12 22V38L24 44L36 38V22C36 10 24 4 24 4Z" fill="#2980b9" opacity="0.15"/>
        <path d="M24 8L14 14V30L24 36L34 30V14L24 8Z" fill="none" stroke="#1a3c5e" stroke-width="1.5"/>
        <path d="M18 20H30M18 25H30M18 30H26" stroke="#2980b9" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="24" cy="13" r="3" fill="#2980b9"/>
      </svg>
      <div class="logo-name">LIBRARY UNIVERSITY</div>
    </div>

    <h2 class="form-title">QUÊN MẬT KHẨU</h2>
    <p class="instruction">Vui lòng nhập Email đã đăng ký để nhận mã xác nhận</p>

    <form id="forgotForm">
      <div class="form-group">
        <label for="email">Email của bạn</label>
        <input type="email" id="email" name="email" placeholder="" autocomplete="email" />
      </div>
      <button type="submit" class="btn-primary">GỬI MÃ XÁC NHẬN</button>
    </form>

    <p class="bottom-text">
      Quay lại <a href="dangnhap.html">Đăng nhập</a>
    </p>
  </div>

  <div class="toast" id="toast"></div>

  <script src="assets/js/quenmatkhau.js"></script>
  <script>
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type} show`;
      setTimeout(() => t.className = 'toast', 3500);
    }

    document.getElementById('forgotForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();

      if (!email) {
        showToast('Vui lòng nhập email của bạn.', 'error');
        return;
      }

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        showToast('Email không hợp lệ, vui lòng kiểm tra lại.', 'error');
        return;
      }

      // TODO: gọi API backend gửi mã xác nhận
      showToast(`Mã xác nhận đã được gửi tới ${email}`, 'success');
    });
  </script>
</body>
</html>
